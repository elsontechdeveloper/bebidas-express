<section class="products-section">
  <div class="section-header">
    <h2><i class="fas fa-fire"></i> DESTAQUES</h2>
    <a routerLink="/promocoes" class="view-all">Ver todos</a>
  </div>

  <div class="products-grid">
    @for (product of products; track product.id) {
      <app-product-card 
        [product]="product"
        (addToCart)="addToCart($event)">
      </app-product-card>
    }
  </div>
</section>
